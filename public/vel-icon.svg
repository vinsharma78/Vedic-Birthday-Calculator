      fill="#5E2B97"
    />
    
    <!-- Stem -->
    <path d="M50 130V140" stroke="#F27D26" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Tripundra (3 lines) -->
    <path d="M35 75H65" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M30 85H70" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M35 95H65" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Bindu (Dot) -->
    <circle cx="50" cy="85" r="5" fill="#F27D26"/>
    
    <!-- Decorative base curls -->
    <path d="M42 122C38 122 34 118 34 114C34 110 38 106 42 106" stroke="#F27D26" stroke-width="3" stroke-linecap="round"/>
    <path d="M58 122C62 122 66 118 66 114C66 110 62 106 58 106" stroke="#F27D26" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
