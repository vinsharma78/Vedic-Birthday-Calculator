<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid Background for the entire icon -->
  <rect width="512" height="512" fill="#5E2B97"/>
  
  <g transform="translate(106, 40) scale(3)">
    <defs>
      <linearGradient id="vel-grad-icon" x1="50" y1="5" x2="50" y2="130" gradientUnits="userSpaceOnUse">
        <stop stop-color="#F27D26" />
        <stop offset="1" stop-color="#FFFFFF" />
      </linearGradient>
    </defs>
    
    <!-- Vel Leaf Shape -->
    <path 
      d="M50 5C50 5 15 55 15 90C15 120 35 130 50 130C65 130 85 120 85 90C85 55 50 5Z" 
